name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Python application
        run: python hello.py

      - name: Build Docker Image
        run: docker build -t devops-hello .

      - name: Run Docker Container
        run: docker run devops-hello